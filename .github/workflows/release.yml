name: Release Project

on:
  workflow_dispatch:
    inputs:
      changelog:
        type: string
        description: "Changelog to replace the auto-generated one"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            id: linuxx64
          - os: ubuntu-24.04-arm
            id: linuxarm64
          - os: windows-2025
            id: mingwx64
          - os: macos-15-intel
            id: macosx64
          - os: macos-15
            id: macosarm64

    permissions:
      contents: read
      id-token: write
      attestations: write

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
      - uses: actions/setup-dotnet@v5
        if: ${{ matrix.os == 'windows-2025' }}
        with:
          dotnet-version: "9"
      - name: Setup Global Dotnet Tool Cache
        if: ${{ matrix.os == 'windows-2025' }}
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-${{ runner.arch }}-dotnet-tools
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-dotnet-tools
      - name: Install WiX & NSIS
        if: ${{ matrix.os == 'windows-2025' }}
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add --global WixToolset.UI.wixext/5.0.2
          choco install nsis
      - name: Install Kotlin
        if: ${{ matrix.os != 'ubuntu-24.04-arm' }}
        uses: fwilhe2/setup-kotlin@main
        with:
          version: "2.3.0"
          install-native: true
      - name: Setup Konan
        if: ${{ matrix.os != 'ubuntu-24.04-arm' }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.konan/caches
            ~/.konan/dependencies
            ~/.konan/kotlin-native-prebuilt-*
            /root/.konan/caches
            /root/.konan/dependencies
            /root/.konan/kotlin-native-prebuilt-*
          key: ${{ runner.os }}-${{ runner.arch }}-konan
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-konan
      - name: Setup Maven Settings
        if: ${{ matrix.os != 'ubuntu-24.04-arm' }}
        uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: '[{"id": "calcugames", "username": "${{ secrets.MAVEN_USERNAME_CALCUGAMES }}", "password": "${{ secrets.MAVEN_PASSWORD_CALCUGAMES }}"}]'
      - name: Install Doxygen
        uses: ssciwr/doxygen-install@v1
      - name: Link CInterop Command
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          sudo ln -s $KOTLIN_NATIVE_HOME/bin/cinterop /usr/local/bin/cinterop
          sudo ln -s $KOTLIN_NATIVE_HOME/bin/run_konan /usr/local/bin/run_konan
          sudo ln -s $KOTLIN_NATIVE_HOME/bin/kotlinc-native /usr/local/bin/kotlinc-native
      - name: Install Linux Dependencies
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
      - name: Configure Project (Posix)
        if: ${{ matrix.os != 'windows-2025' }}
        run: |
          cmake -B build -DKN_INSTALL_ARTIFACTID="cmdfx-${{ matrix.id }}" -DTEST_CMDFX=OFF
        shell: bash
      - name: Configure Project (Windows)
        if: ${{ matrix.os == 'windows-2025' }}
        run: |
          cmake -B build -G "MinGW Makefiles" -DKN_INSTALL_ARTIFACTID="cmdfx-${{ matrix.id }}" -DTEST_CMDFX=OFF
        shell: bash
      - name: Build Project
        run: |
          cmake --build build --config Release --target docs
          cmake -B build
          cmake --build build --config Release --target package
          rm -rf build/package/_CPack_Packages/
        shell: bash
      - name: Publish Kotlin/Native Library
        run: |
          cmake -B build -DDEPLOY_CMDFX=ON
          cmake --build build --config Release
      - name: Archive Package Artifacts
        id: archive
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: CmdFX-Release-${{ runner.os }}-${{ runner.arch }}-${{ github.sha }}
          path: build/package/*
          overwrite: true
      - name: Attest Build Artifacts
        if: success() || failure()
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: CmdFX-Release-${{ runner.os }}-${{ runner.arch }}-${{ github.sha }}
          subject-digest: sha256:${{ steps.archive.outputs.artifact-digest }}
  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract Version from CMakeLists.txt
        id: get_version
        run: |
          VERSION=$(grep -Po '(?<=set\(PROJECT_VERSION ")[^"]*' CMakeLists.txt)
          echo "Extracted Version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Retrieve Latest Tag
        id: latest_tag
        run: echo "LATEST_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
      - name: Download Release Artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: CmdFX-Release-*
          path: build/package
          merge-multiple: true
      - name: Generate Changelog
        if: ${{ github.event.inputs.changelog == '' }}
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: ".github/release.json"
          mode: "HYBRID"
          fromTag: "${{ env.LATEST_TAG }}"
          toTag: "master"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/package/**/*
          tag_name: v${{ env.VERSION }}
          name: cmdfx v${{ env.VERSION }}
          body: ${{ steps.changelog.outputs.changelog || github.event.inputs.changelog }}
          draft: false
          prerelease: false
      - name: Update Homebrew Formula Checksum
        run: |
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/v${VERSION}.tar.gz"
          # the tag tarball is generated lazily by GitHub; retry until it is ready
          for i in $(seq 1 12); do
            if curl -fsSL "$URL" -o /tmp/cmdfx-src.tar.gz; then break; fi
            echo "source tarball not ready yet (attempt $i); retrying..."
            sleep 5
          done
          SHA=$(sha256sum /tmp/cmdfx-src.tar.gz | awk '{print $1}')
          echo "## Homebrew formula" >> "$GITHUB_STEP_SUMMARY"
          echo "v${VERSION} source tarball sha256: \`${SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          sed -i -E "s#archive/refs/tags/v[0-9][0-9.]*\.tar\.gz#archive/refs/tags/v${VERSION}.tar.gz#" Formula/cmdfx.rb
          sed -i -E "s#^([[:space:]]*sha256 )\"[0-9a-fA-F]*\"#\1\"${SHA}\"#" Formula/cmdfx.rb
      - name: Commit Updated Formula
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git"
          git add Formula/cmdfx.rb
          if git diff --cached --quiet; then
            echo "formula already up to date"
          else
            git commit -m "chore: update Homebrew formula sha256 for v${VERSION}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
